name: Sync upstream babyagi

on:
  schedule:
    - cron: "0 0 * * 1"   # chạy mỗi thứ 2
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: git remote add upstream https://github.com/yoheinakajima/babyagi.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Sync fork
        run: |
          git checkout main
          git reset --hard upstream/main

      - name: Push changes
        run: git push origin main --force
